<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ระบบบันทึกข้อมูลรถ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- Header -->
  <div class="header">
    <div class="container">
      <div class="header-top">
        <div class="header-icon">🏢</div>
        <div>
          <div class="header-title">ระบบบันทึกข้อมูลรถ</div>
          <div class="header-subtitle">PARKING SECURITY SYSTEM</div>
        </div>
      </div>

      <!-- Stats row -->
      <div class="stats-row" id="stats-row">
        <div class="stat-card">
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-label">รถทั้งหมด</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-registered" style="color:#22c55e">0</div>
          <div class="stat-label">ลงทะเบียน</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-unreg" style="color:#ef4444">0</div>
          <div class="stat-label">ไม่ลงทะเบียน</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-dup" style="color:#a78bfa">0</div>
          <div class="stat-label">ทะเบียนซ้ำ</div>
        </div>
      </div>

      <!-- Main tabs -->
      <div class="tabs-row">
        <button class="tab-btn active" data-tab="entry" onclick="switchTab('entry')">🚗 บันทึกรถเข้า</button>
        <button class="tab-btn" data-tab="records" onclick="switchTab('records')">📊 ประวัติ &amp; Dashboard</button>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="container content">

    <!-- ── ENTRY TAB ── -->
    <div id="tab-entry" class="tab-panel">
      <div class="form-group">
        <label class="form-label">📅 วันที่</label>
        <input type="date" id="input-date" class="inp" />
      </div>
      <div class="form-group">
        <label class="form-label">🕐 เวลา</label>
        <input type="time" id="input-time" class="inp" />
      </div>
      <div class="form-group">
        <label class="form-label">🚗 ทะเบียนรถ</label>
        <input type="text" id="input-plate" class="inp plate-inp" placeholder="เช่น กข 1234 / ABC 123" autocomplete="off" />
        <div id="plate-status" class="plate-status hidden"></div>
      </div>
      <button class="btn-primary" id="btn-submit" onclick="handleSubmit()">✔ บันทึกและตรวจสอบ</button>
      <div class="info-box">
        <div class="info-title">ℹ️ วิธีใช้งาน</div>
        กรอกวันที่ เวลา และทะเบียนรถ แล้วกด <strong>บันทึก</strong>
      </div>
    </div>

    <!-- ── RECORDS TAB ── -->
    <div id="tab-records" class="tab-panel hidden">
      <!-- Sub-tabs -->
      <div class="sub-tabs-row">
        <button class="sub-tab-btn active" data-subtab="dashboard" onclick="switchSubTab('dashboard')">📊 Dashboard</button>
        <button class="sub-tab-btn" data-subtab="monthly" onclick="switchSubTab('monthly')">📅 รายเดือน</button>
        <button class="sub-tab-btn" data-subtab="duplicates" onclick="switchSubTab('duplicates')">🔁 ทะเบียนซ้ำ</button>
        <button class="sub-tab-btn" data-subtab="list" onclick="switchSubTab('list')">📋 รายการ</button>
      </div>

      <!-- Dashboard -->
      <div id="subtab-dashboard" class="subtab-panel"></div>

      <!-- Monthly -->
      <div id="subtab-monthly" class="subtab-panel hidden">
        <div class="form-group">
          <label class="form-label">เลือกเดือน</label>
          <select id="month-select" class="inp" onchange="renderMonthly()"></select>
        </div>
        <div id="monthly-summary"></div>
        <div id="monthly-list"></div>
      </div>

      <!-- Duplicates -->
      <div id="subtab-duplicates" class="subtab-panel hidden"></div>

      <!-- List -->
      <div id="subtab-list" class="subtab-panel hidden">
        <input type="text" id="search-input" class="inp" placeholder="🔍 ค้นหาทะเบียน / วันที่ / เวลา" oninput="renderList()" />
        <div id="list-records" style="margin-top:10px"></div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
